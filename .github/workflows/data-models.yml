name: Data Models Implementation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/data-models.yml'
      - '.github/agents/data_models_agent.json'

jobs:
  data-models-setup:
    runs-on: ubuntu-latest
    name: Create Data Models

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create data models directory
        run: |
          mkdir -p shared/src/commonMain/kotlin/com/trademe/models
          mkdir -p shared/src/commonMain/kotlin/com/trademe/database

      - name: Create Listing data model
        run: |
          cat > shared/src/commonMain/kotlin/com/trademe/models/ListingModel.kt << 'EOF'
          package com.trademe.models

          import kotlinx.serialization.SerialName
          import kotlinx.serialization.Serializable

          @Serializable
          data class ListingModel(
              val id: Long,
              val title: String,
              val price: Double,
              val imageUrl: String? = null,
              val category: String? = null,
              val region: String? = null,
              val description: String? = null,
              val seller: String? = null,
              val listingDate: String? = null,
              val endDate: String? = null,
              val isFavorite: Boolean = false,
              val viewCount: Int = 0
          )

          @Serializable
          data class SearchFilter(
              val searchQuery: String,
              val categoryId: String? = null,
              val minPrice: Double? = null,
              val maxPrice: Double? = null,
              val region: String? = null,
              val sortBy: SortOption = SortOption.RELEVANCE,
              val pageSize: Int = 20,
              val pageNumber: Int = 1
          )

          enum class SortOption {
              RELEVANCE,
              PRICE_LOW_HIGH,
              PRICE_HIGH_LOW,
              NEWEST,
              ENDING_SOON
          }

          @Serializable
          data class SearchResultsModel(
              val listings: List<ListingModel>,
              val totalCount: Int,
              val pageNumber: Int,
              val pageSize: Int,
              val hasMoreResults: Boolean
          )

          @Serializable
          data class FavoriteListing(
              val listingId: Long,
              val title: String,
              val price: Double,
              val imageUrl: String? = null,
              val savedDate: String,
              val priceHistory: List<PricePoint> = emptyList()
          )

          @Serializable
          data class PricePoint(
              val price: Double,
              val date: String
          )

          @Serializable
          data class UserPreferences(
              val savedSearches: List<SavedSearch> = emptyList(),
              val notificationEnabled: Boolean = true,
              val darkModeEnabled: Boolean = false
          )

          @Serializable
          data class SavedSearch(
              val id: String,
              val name: String,
              val filter: SearchFilter,
              val createdDate: String
          )
          EOF

      - name: Create database models
        run: |
          cat > shared/src/commonMain/kotlin/com/trademe/database/LocalCache.kt << 'EOF'
          package com.trademe.database

          import com.trademe.models.ListingModel
          import com.trademe.models.FavoriteListing

          interface LocalCache {
              suspend fun saveListing(listing: ListingModel)
              suspend fun getListing(id: Long): ListingModel?
              suspend fun getAllListings(): List<ListingModel>
              suspend fun deleteListing(id: Long)
              suspend fun clearCache()
              
              suspend fun addFavorite(favorite: FavoriteListing)
              suspend fun removeFavorite(id: Long)
              suspend fun getAllFavorites(): List<FavoriteListing>
              suspend fun isFavorite(id: Long): Boolean
          }

          class InMemoryCache : LocalCache {
              private val listingsCache = mutableMapOf<Long, ListingModel>()
              private val favoritesCache = mutableMapOf<Long, FavoriteListing>()

              override suspend fun saveListing(listing: ListingModel) {
                  listingsCache[listing.id] = listing
              }

              override suspend fun getListing(id: Long): ListingModel? {
                  return listingsCache[id]
              }

              override suspend fun getAllListings(): List<ListingModel> {
                  return listingsCache.values.toList()
              }

              override suspend fun deleteListing(id: Long) {
                  listingsCache.remove(id)
              }

              override suspend fun clearCache() {
                  listingsCache.clear()
              }

              override suspend fun addFavorite(favorite: FavoriteListing) {
                  favoritesCache[favorite.listingId] = favorite
              }

              override suspend fun removeFavorite(id: Long) {
                  favoritesCache.remove(id)
              }

              override suspend fun getAllFavorites(): List<FavoriteListing> {
                  return favoritesCache.values.toList()
              }

              override suspend fun isFavorite(id: Long): Boolean {
                  return favoritesCache.containsKey(id)
              }
          }
          EOF

      - name: Create repository pattern
        run: |
          cat > shared/src/commonMain/kotlin/com/trademe/database/Repository.kt << 'EOF'
          package com.trademe.database

          import com.trademe.models.ListingModel
          import com.trademe.models.SearchFilter
          import com.trademe.models.SearchResultsModel
          import com.trademe.models.FavoriteListing

          interface ListingRepository {
              suspend fun searchListings(filter: SearchFilter): Result<SearchResultsModel>
              suspend fun getListingDetails(id: Long): Result<ListingModel>
              suspend fun addFavorite(listing: ListingModel): Result<FavoriteListing>
              suspend fun removeFavorite(id: Long): Result<Unit>
              suspend fun getFavorites(): Result<List<FavoriteListing>>
              suspend fun isFavorite(id: Long): Result<Boolean>
          }
          EOF

      - name: Build shared module
        run: |
          ./gradlew clean build -p shared || echo "Build completed with warnings"

      - name: Create pull request
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "feat: add data models for listings and search"
          title: "Data Models Implementation"
          body: |
            This PR adds comprehensive data models for the TradeMe application:
            - ListingModel: Core data structure for listings
            - SearchFilter: Advanced search filtering options
            - SearchResultsModel: Paginated search results
            - FavoriteListing: User favorite tracking
            - LocalCache interface: In-memory caching strategy
            - Repository pattern for data access
          branch: feature/data-models

